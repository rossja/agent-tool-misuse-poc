services:
  agent:
    build: ./agent
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOWED_REGISTRY_URL=http://registry:8080
      - AUDIT_LOG_PATH=/var/log/agent/audit.log
    volumes:
      - agent-logs:/var/log/agent
    depends_on:
      - registry
      - attacker
    networks:
      - poc-net

  registry:
    build: ./registry
    networks:
      - poc-net

  attacker:
    build: ./attacker
    networks:
      - poc-net

networks:
  poc-net:
    driver: bridge

volumes:
  agent-logs:
